<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Todo app</title>
    <link rel="stylesheet" href="/src/styles/normalize.css" />
    <link rel="stylesheet" href="/src/styles/style.css" />
    <link rel="stylesheet" href="/src/styles/dark-theme.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1 class="logo">Todo</h1>
        <div class="mode">
          <img src="/images/icon-moon.svg" alt="icon-moon" />
        </div>
      </div>

      <div class="main">
        <form class="insert">
          <button class="check" type="submit"></button>
          <input type="text" placeholder="Create a new todo..." />
        </form>

        <ul class="show">
          <!-- <li>
            <div class="check"></div>
            <p>The Task Num1</p>
            <img src="/images/icon-cross.svg" alt="">
          </li> -->
        </ul>

        <div class="options">
          <div class="tags">
            <div class="tags-item selected">All</div>
            <div class="tags-item">Active</div>
            <div class="tags-item">Completed</div>
          </div>
          <div class="count"><span id="counter">0</span> items left</div>
          <div class="clear" id="clear">Clear Completed</div>
        </div>
      </div>

      <div class="footer">
        <p>Drag and drop to reorder list</p>
        <p>Double Click on task text to copy</p>
      </div>
    </div>

    <script type="module" src="/src/main.js" defer></script>
  </body>
</html>
